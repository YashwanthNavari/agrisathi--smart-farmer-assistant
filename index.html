<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="AgriSathi V2 – Professional AI Agricultural Assistant. Satellite monitoring, voice-first advisory, and high-end farm management." />
    <meta name="theme-color" content="#052e16" />
    <title>AgriSathi Pro | Future of Farming 🌾</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
            },
            colors: {
              agri: {
                50: '#f0fdf4',
                100: '#dcfce7',
                200: '#bbf7d0',
                300: '#86efac',
                400: '#4ade80',
                500: '#22c55e',
                600: '#16a34a',
                700: '#15803d',
                800: '#166534',
                900: '#14532d',
                950: '#052e16', // Midnight Green
                gold: '#fbbf24', // Agri Gold
                clay: '#78350f',
              },
            },
            animation: {
              'pulse-gold': 'pulseGold 3s infinite',
              'float': 'float 4s ease-in-out infinite',
              'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'liquid': 'liquid 12s linear infinite',
              'wave': 'wave 2s ease-in-out infinite',
            },
            keyframes: {
              pulseGold: {
                '0%, 100%': { boxShadow: '0 0 0 0 rgba(251, 191, 36, 0.4)' },
                '50%': { boxShadow: '0 0 0 15px rgba(251, 191, 36, 0)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                '50%': { transform: 'translateY(-12px) rotate(2deg)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(30px) scale(0.98)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
              liquid: {
                '0%': { transform: 'translate(0, 0) scale(1)' },
                '33%': { transform: 'translate(10px, -20px) scale(1.1)' },
                '66%': { transform: 'translate(-15px, 15px) scale(0.9)' },
                '100%': { transform: 'translate(0, 0) scale(1)' },
              },
              wave: {
                '0%, 100%': { transform: 'scaleY(0.4)' },
                '50%': { transform: 'scaleY(1.2)' },
              }
            },
          },
        },
      }
    </script>
    
    <style>
      @layer base {
        body {
          @apply font-sans antialiased text-slate-800 bg-slate-50;
          overflow-x: hidden;
        }
        h1, h2, h3, h4, .font-display {
          @apply font-display tracking-tight text-agri-950;
        }
      }

      /* Futurstic Pro Background */
      .pro-bg {
        background-color: #f8fafc;
        background-image: 
          radial-gradient(at 0% 0%, hsla(142, 69%, 94%, 0.8) 0, transparent 50%), 
          radial-gradient(at 100% 0%, hsla(45, 93%, 90%, 0.5) 0, transparent 40%),
          radial-gradient(at 50% 100%, hsla(142, 70%, 92%, 0.6) 0, transparent 50%);
        position: fixed;
        inset: 0;
        z-index: -1;
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* V2 Glassmorphism */
      .glass-pro {
        @apply bg-white/60 backdrop-blur-xl border border-white/40 shadow-[0_8px_32px_0_rgba(31,38,135,0.07)];
      }
      .glass-midnight {
        @apply bg-agri-950/80 backdrop-blur-xl border border-white/10 shadow-2xl;
      }

      /* Interactive States */
      .hover-lift { @apply transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:shadow-agri-900/5; }
      
      .pb-safe { padding-bottom: calc(2rem + env(safe-area-inset-bottom)); }
      .pt-safe { padding-top: env(safe-area-inset-top); }
    </style>
  </head>
  <body>
    <div class="pro-bg text-agri-950"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
